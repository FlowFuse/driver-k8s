name: Build and push packages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: 'flowfuse/github-actions-workflows/.github/workflows/build_node_package.yml@v0.52.0'
    with:
      node: '[
              {"version": "18", "tests": false, "lint": true},
            ]'

  publish:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: 'flowfuse/github-actions-workflows/.github/workflows/publish_node_package.yml@v0.52.0'
    with:
      package_name: driver-k8s
      publish_package: true
    secrets:
      npm_registry_token: ${{ secrets.NPM_PUBLISH_TOKEN }}

  dispatch_container_build:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ secrets.GH_BOT_APP_ID }}
          private-key: ${{ secrets.GH_BOT_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: flowfuse/helm
      - name: Trigger flowfuse container build
        uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4 # v1.3.1
        with:
          workflow: flowforge-container.yml
          repo: flowfuse/helm
          ref: main
          token: ${{ steps.generate_token.outputs.token }}    
  